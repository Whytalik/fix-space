services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: fixspace
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d fixspace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mt5-sidecar:
    profiles:
      - full
    build:
      context: ./services/mt5-sidecar
      dockerfile: Dockerfile
    environment:
      - MT5_SIDECAR_TOKEN=${MT5_SIDECAR_TOKEN:-}
    ports:
      - '8000:8000'

  api:
    profiles:
      - full
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/fixspace?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-for-diploma-project}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super-refresh-secret-key-for-diploma-project}
      - PORT=3000
      - NODE_ENV=production
      - COOKIE_SECURE=false
      - MT5_SIDECAR_URL=http://mt5-sidecar:8000
      - MT5_SIDECAR_TOKEN=${MT5_SIDECAR_TOKEN:-}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mt5-sidecar:
        condition: service_started

  web:
    profiles:
      - full
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    environment:
      - PORT=3001
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:3000
    ports:
      - '3001:3001'
    depends_on:
      - api

  db-test:
    profiles:
      - test
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fixspace_test
    ports:
      - '5433:5432'
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fixspace_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  pgdata-test:
