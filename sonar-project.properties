# SonarCloud Configuration
sonar.organization=whytalik
sonar.projectKey=Whytalik_fix-space
sonar.projectName=fix-space
sonar.projectVersion=1.0.0

# Source & Test paths
# We include packages/typescript-config and packages/eslint-config so Sonar can resolve extended configs,
# but we exclude them from actual analysis metrics if they are just JSON/JS configs.
sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.config.*,**/*.rc.*,apps/web/src/lib/server-only-stub.js

sonar.tests=apps,packages
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**

# TypeScript Configuration
# Explicitly listing tsconfigs helps the scanner resolve the project structure and "extends" fields.
# We also include the base configs to help resolution.
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json,packages/database/tsconfig.json,packages/domain/tsconfig.json,packages/typescript-config/base.json,packages/typescript-config/nestjs.json,packages/typescript-config/nextjs.json

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths
# Turbo caches coverage in packages/apps folders.
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/domain/coverage/lcov.info,packages/database/coverage/lcov.info
