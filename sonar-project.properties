# SonarCloud Configuration
sonar.organization=whytalik
sonar.projectKey=Whytalik_fix-space
sonar.projectName=fix-space
sonar.projectVersion=1.0.0

# Source & Test paths
sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,packages/eslint-config/**,packages/jest-config/**,packages/typescript-config/**,**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx,**/*.config.*,**/*.rc.*,apps/web/src/lib/server-only-stub.js

sonar.tests=apps,packages
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage report paths (matching Vitest/Jest output)
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
